<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geocentric</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Geocentric</h1>
            <p>Find out which planets you can see from your location tonight</p>
        </header>

        <div class="input-panel">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Location</label>
                    <div class="location-row">
                        <div class="form-group">
                            <input type="number" id="latitude" placeholder="Latitude (e.g. 40.7128)" step="any" min="-90" max="90">
                        </div>
                        <div class="form-group">
                            <input type="number" id="longitude" placeholder="Longitude (e.g. -74.0060)" step="any" min="-180" max="180">
                        </div>
                        <div class="locate-group">
                            <button id="locate-btn" class="btn btn-secondary">Use My Location</button>
                            <span id="location-status" class="location-status"></span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Start Time</label>
                    <input type="datetime-local" id="start-time">
                </div>
                <div class="form-group">
                    <label>End Time</label>
                    <input type="datetime-local" id="end-time">
                </div>
            </div>
            <div class="actions">
                <button id="calculate-btn" class="btn btn-primary">Calculate</button>
            </div>
        </div>

        <div id="error-message"></div>

        <div id="results"></div>

        <footer class="page-footer">
            Background image credit: <a href="https://commons.wikimedia.org/wiki/File:2021-02-13_-_Sterne_von_Klein_Flintbek_aus_(3).jpg">Fabian Horst</a>, <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>
            <br>
            <a href="https://github.com/michaeldonnelly/geocentric">source code</a>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/planets.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
